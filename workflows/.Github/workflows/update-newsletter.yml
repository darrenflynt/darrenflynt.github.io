name: Update FinOps Insider Newsletter Data

on:
  schedule:
    # Runs every Monday at noon Pacific (20:00 UTC / 8pm UTC)
    - cron: '0 20 * * 1'
  workflow_dispatch:
    # Also allows manual trigger from GitHub Actions tab

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Fetch newsletter data
        run: python scripts/fetch_newsletter.py

      - name: Commit updated newsletter.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add newsletter.json
          git diff --cached --quiet || git commit -m "chore: update FinOps Insider newsletter data [skip ci]"
          git push
